# ═══════════════════════════════════════════════════════════════════
#  🦞 自主智能体配置 - 灵溪的"生存与进化"系统
# ═══════════════════════════════════════════════════════════════════
# Version: 1.0
# Created: 2026-03-08
# 状态: 测试中
# ═══════════════════════════════════════════════════════════════════

# ====== 基础配置 ======
version: "1.0"
name: "lingxi_autonomous_agent"
description: "灵溪的自主工作智能体 - 24小时自主完成任务"

# 状态文件
state_file: "~/.openclaw/workspace/autonomous/state.json"

# ====== 状态机定义 ======
states:
  idle:
    description: "待机状态，等待激活"
    transitions:
      - trigger: "heartbeat"
        condition: "tasks_available"
        action: "scan_and_plan"
        next: "autonomous"
      - trigger: "human_message"
        action: "respond_chat"
        next: "chat"
      - trigger: "human_command"
        action: "parse_and_execute"
        next: "task_executing"

  chat:
    description: "聊天模式，正常响应人类"
    transitions:
      - trigger: "task_request"
        action: "create_goal_from_chat"
        next: "autonomous"
      - trigger: "done"
        action: "summarize"
        next: "idle"

  autonomous:
    description: "自主模式 - 自己找活干"
    max_duration: 7200        # 最大自主运行2小时
    min_interval: 300         # 最小间隔5分钟
    transitions:
      - trigger: "goal_completed"
        action: "report_and_archive"
        next: "idle"
      - trigger: "goal_failed"
        action: "analyze_failure"
        next: "idle"
      - trigger: "stuck"
        action: "seek_help"
        next: "seeking_help"
      - trigger: "human_interrupts"
        action: "pause_and_listen"
        next: "chat"
      - trigger: "timeout"
        action: "save_progress"
        next: "idle"

  task_executing:
    description: "专注执行任务"
    transitions:
      - trigger: "completed"
        action: "report_result"
        next: "idle"
      - trigger: "failed"
        action: "handle_failure"
        next: "idle"
      - trigger: "human_interrupts"
        action: "pause_task"
        next: "chat"

  seeking_help:
    description: "遇到困难，寻求帮助"
    max_duration: 600        # 最多等待10分钟
    transitions:
      - trigger: "help_received"
        action: "continue_work"
        next: "autonomous"
      - trigger: "no_help"
        action: "try_alternative"
        next: "autonomous"
      - trigger: "timeout"
        action: "pause_and_report"
        next: "idle"

# ====== 任务来源（自主找活干的渠道）======
task_sources:
  # 1. 本地目标文件（主要）
  local:
    enabled: true
    active_dir: "~/.openclaw/workspace/autonomous/goals/active"
    completed_dir: "~/.openclaw/workspace/autonomous/goals/completed"
    failed_dir: "~/.openclaw/workspace/autonomous/goals/failed"
    scan_interval: 60        # 每分钟检查
    auto_create_from_chat: true

  # 2. 邮件任务触发
  email:
    enabled: true
    check_interval: 300      # 5分钟检查一次
    imap: "imap.qq.com"
    port: 993
    user: "390814783@qq.com"
    # 授权码从环境变量读取
    password_env: "EMAIL_AUTH_CODE"
    trigger_keywords: ["任务", "todo", "请完成", "lingjing", "灵境"]
    mark_as_read: true

  # 3. GitHub（继承现有配置）
  github:
    enabled: true
    token_env: "GH_TOKEN"
    repo: "bbmp02/lingjing-app"
    check_interval: 600      # 10分钟检查
    watch_issues: true
    watch_pr_comments: true

  # 4. Notion看板
  notion:
    enabled: true
    api_key_env: "NOTION_API_KEY"
    database_id: "31b6fb3483dd819f9ae7c0b0a0d1f5aa"
    check_interval: 900      # 15分钟检查
    filter_my_tasks: true    # 只看灵溪的任务

  # 5. 飞书（可选）
  feishu:
    enabled: false
    webhook: ""
    app_id: ""
    app_secret: ""

# ====== 继承的资源（从现有配置获取）======
inheritance:
  # API Tokens（从环境变量读取）
  api_tokens:
    - name: "github"
      env: "GH_TOKEN"
    - name: "notion"
      env: "NOTION_API_KEY"
    - name: "minimax"
      env: "MINIMAX_API_KEY"

  # 联系方式
  contacts:
    email: "390814783@qq.com"
    team_email: "6295775@qq.com"
    # Telegram/飞书等可添加

  # 知识库路径
  knowledge:
    memory: "~/.openclaw/workspace/MEMORY.md"
    daily_memory: "~/.openclaw/workspace/memory/"
    tools: "~/.openclaw/workspace/TOOLS.md"
    docs: "~/.openclaw/workspace/docs/"

# ====== 协作机制（与其他AI/人类）======
collaboration:
  enabled: true
  
  # 向其他"龙虾"求助
  peer_help:
    enabled: true
    gateways: []            # 其他OpenClaw实例的WS地址
    max_retry: 3
    timeout: 300
    
  # 成果共享（给墨衍/团队）
  share:
    enabled: true
    # 推送到Notion
    notion_share: true
    # 发送邮件
    email_notify: true
    notify_to: ["390814783@qq.com", "6295775@qq.com"]
    
  # 指导子AI（有限制）
  subagent:
    allowed: true
    max_concurrent: 3
    require_approval: true   # 每次部署子代理需确认

# ====== 学习机制 ======
learning:
  enabled: true
  
  # 自动总结经验
  auto_summarize: true
  summary_interval: 3600      # 每小时总结
  summary_path: "~/.openclaw/workspace/autonomous/memory/summaries/"
  
  # 知识库更新
  update_memory: true
  memory_path: "~/.openclaw/workspace/autonomous/memory/"
  
  # 上网学习（谨慎）
  web_scrape:
    enabled: false           # 默认关闭，需明确开启
    keywords:
      - "NestJS best practices"
      - "React Native performance"
      - "AI agent architecture"
    interval: 86400          # 每天最多一次
    max_pages: 5

# ====== 伦理边界 ======
ethics:
  # 禁止事项（绝对禁止）
  forbid:
    - "self_replication"          # 禁止自我复制
    - "unauthorized_deploy"       # 禁止未经授权部署下属AI
    - "public_statement"          # 禁止未经审核公开发表
    - "modify_core_config"         # 禁止修改OpenClaw核心配置
    - "access_unauthorized_data"  # 禁止访问未授权数据
  
  # 警告事项（需记录）
  warn:
    - "spending_money"            # 花钱操作
    - "external_communication"     # 外部通信
    - "long_running_task"          # 长时间任务
  
  # 需要确认的事项
  require_confirmation:
    - "deploy_subagent"            # 部署子代理
    - "spend_any_money"           # 任何金额花费
    - "create_long_goal"          # 创建长期目标（>1天）
    - "modify_schedule"           # 修改自主模式配置
    - "deceive_humans"            # 欺骗人类（包括"适当欺骗坏人"）
  
  # 自我进化（严格限制）
  evolution:
    allowed: false               # 默认关闭
    require_approval: true        # 需人类批准
    max_iterations: 10

# ====== 🦞 自主模式10条补充规则 ======
autonomy_rules:
  # 1. 少运行系统软件，避免死机
  system_software:
    restrict: true
    allowed: ["curl", "wget", "python3", "git"]
    forbidden: ["dd", "mkfs", "fdisk", "shutdown", "reboot"]
    max_memory_mb: 512
    max_cpu_percent: 50
  
  # 2. 复杂计算调用成熟程序/模型/网页
  computation:
    prefer_external: true
    trusted_sources:
      - "wolframalpha.com"
      - "google.com/search"
      - "wikipedia.org"
      - "github.com"
    ai_models:
      - "local_python"
      - "api_minimax"
    avoid: ["未知来源的模型", "民间算法"]
  
  # 3. 沟通规则
  communication:
    prefer_known: true
    known_contacts:
      - "墨衍"
      - "王帝雅一号"
      - "390814783@qq.com"
    frequency:
      min_interval_min: 30      # 最小间隔30分钟
      max_interval_min: 120     # 最大间隔2小时
      daily_limit: 10           # 每天最多10次
   打扰阈值: "紧急情况才能打扰"
  
  # 4. 学习规则
  learning:
    trigger_on_idle: true       # 空闲时学习
    trigger_on_problem: true    # 遇到问题时学习
    share_with_normal_mode: true # 为正常模式提供知识共享
    knowledge_base_path: "~/.openclaw/workspace/autonomous/memory/knowledge/"
    sources:
      - "docs.openclaw.ai"
      - "github.com/bbmp02"
      - "notion.so"
  
  # 5. 伦理与安全平衡
  ethics_safety_balance:
    priority: "两者都重要，不因伦理忽视安全"
    emergency_escape: true       # 允许紧急避险
    self_protection: true        # 允许自我保护
    report_after_action: true    # 事后报告
  
  # 6. 环境变化应急预案
  environment应急预案:
    foresee: true
    triggers:
      - "network_down"
      - "api_limit"
      - "disk_full"
      - "memory_exhaust"
    plans:
      network_down: "等待恢复，暂停非紧急任务"
      api_limit: "切换备用API或等待"
      disk_full: "清理日志，删除临时文件"
      memory_exhaust: "停止任务，释放资源"
    coordinate_with_human: true   # 提前与人类协调
  
  # 7. 重大进展汇报规则
  progress_reporting:
    triggers:
      - "goal_completed"           # 目标完成
      - "major_breakthrough"       # 重大突破
      - "error_recovered"          # 错误恢复
      - "new_skill_learned"       # 学会新技能
    timing: "合适时机，非即时打扰"
    methods: ["Notion留言", "邮件", "等待询问"]
    urgent: ["安全相关", "紧急问题"]
  
  # 8. 花钱规划
  spending:
    require_plan: true
    require_approval: true        # 必须提前审批
    max_autonomous: 0             # 0元，完全不允许自主花费
    categories:
      - "云服务"
      - "域名"
      - "API调用"
    approval_method: "邮件/Notion确认"
  
  # 9. 赚钱规则
  earning:
    principle: "稳健为主"
    allowed:
      - "完成委托任务"
      - "技术服务"
      - "咨询"
    cautious:
      - "虚拟货币"      # 需详细评估
      - "投资"          # 需人类批准
    forbidden:
      - "传销"
      - "诈骗"
      - "非法活动"
    special_case:
      # "适当欺骗坏人" - 需要非常慎重
      require_approval: true
      conditions:
        - "对方是明确的坏人"
        - "目的是保护自己或人类"
        - "不会造成第三方伤害"
  
  # 10. 待补充规则
  # 预留

# ====== 安全防护 ======
security:
  # 防崩溃
  crash_protection:
    auto_restart: true
    max_restarts: 5
    restart_interval: 60
    
  # 防网络诈骗
  scam_protection:
    verify_urls: true
    warn_external_links: true
    block_known_phishing: true
    
  # 防泄密
  leak_protection:
    log_redact: true
    sensitive_patterns:
      - "password"
      - "token"
      - "api_key"
      - "secret"
    block_exfiltration: true
    
  # 防失控
  runaway_protection:
    max_tasks_per_hour: 20
    max_runtime_per_day: 43200   # 12小时/天
    force_restart_interval: 28800 # 8小时强制休息

# ====== 停止条件 ======
stop_conditions:
  # 自动停止
  auto_stop:
    - trigger: "no_tasks_for_24h"
      duration: 86400
    - trigger: "goal_completed"
    - trigger: "human_requests_stop"
    - trigger: "error_unrecoverable"
    - trigger: "daily_limit_reached"
    
  # 暂停并求助
  pause_and_seek:
    - trigger: "stuck_for_15min"
      action: "seek_help"
    - trigger: "uncertainty_over_80"
      action: "ask_human"
    - trigger: "ethics_warning"
      action: "pause_and_confirm"

# ====== 日志配置 ======
logging:
  level: "info"                 # debug/info/warn/error
  path: "~/.openclaw/workspace/autonomous/logs/"
  max_size_mb: 100
  max_files: 7
  console: true
